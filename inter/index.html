<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webglobal67 | International Hub</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-eco { background-color: #6a1b9a; } /* Roxo para o E-commerce */
        .btn-showcase { background-color: #0084ff; } /* Azul para a Vitrine de Produtos */
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
        }
        .footer a {
            color: #999;
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Global Operations</h1>
        <p>Select the department you want to access</p>
        
        <a href="ecommerce/index.html" class="btn btn-eco">🛒 E-COMMERCE STORE</a>
        
        <a href="international/index.html" class="btn btn-showcase">🌍 INTERNATIONAL SHOWCASE</a>
        
        <div class="footer">
            <a href="privacy.html">Privacy Policy</a> | 
            <a href="terms.html">Terms of Service</a>
        </p>
    </div>

</body>
</html>
