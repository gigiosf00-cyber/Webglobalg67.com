<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webglobal67 | Central de Acesso</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 40px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        h1 span {
            color: #ff4500;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-br {
            background-color: #00b074;
        }
        .btn-int {
            background-color: #0084ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WEBGLOBAL<span>67</span></h1>
        
        <a href="br/index.html" class="btn btn-br">🇧🇷 VITRINE BRASIL</a>
        
        <a href="inter/international/index.html" class="btn btn-int">🌍 VITRINE INTERNATIONAL</a>
    </div>

</body>
</html>
